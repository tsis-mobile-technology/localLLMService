model_list:
  - model_name: "glm-5.2"
    litellm_params:
      model: "openai/unsloth/GLM-5.2"
      api_base: "http://vllm-glm:8000/v1"
      api_key: "sk-local"
  - model_name: "glm-5.2-fast"
    litellm_params:
      model: "openai/unsloth/GLM-5.2"
      api_base: "http://vllm-glm:8000/v1"
      api_key: "sk-local"
  - model_name: "gpt-4o"
    litellm_params:
      model: "openai/unsloth/GLM-5.2"
      api_base: "http://vllm-glm:8000/v1"
      api_key: "sk-local"

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  store_model_in_db: true
  database_url: os.environ/DATABASE_URL
  log_level: "INFO"

litellm_settings:
  drop_params: true
  cache: true
  cache_params:
    type: "redis"
    host: "localhost"
    port: 6379
  callbacks: ["langfuse"]

router_settings:
  num_retries: 2
  timeout: 300
  fallbacks: []
