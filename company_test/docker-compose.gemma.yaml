services:
  vllm-glm:
    image: vllm/vllm-openai:latest
    platform: linux/amd64
    pull_policy: never
    container_name: vllm-glm-5.2
    ipc: host
    shm_size: 120g
    mem_limit: 124g
    ports:
      - "8000:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=0,1
      - HF_HOME=/root/.cache/huggingface
      - HF_HUB_OFFLINE=0
      - VLLM_USE_V1=1
      - VLLM_LOGGING_LEVEL=INFO
      - CUDA_VISIBLE_DEVICES=0,1
      - NVIDIA_TF32=1
      - NVIDIA_DISABLE_MPS=0
      - TZ=Asia/Seoul
    volumes:
      - ./hf_cache:/root/.cache/huggingface
      - ./models:/root/models
    command: >
      --model unsloth/GLM-5.2
      --tensor-parallel-size 2
      --gpu-memory-utilization 0.90
      --max-model-len 262144
      --max-num-seqs 32
      --max-num-batched-tokens 16384
      --dtype bfloat16
      --kv-cache-dtype fp8
      --enable-prefix-caching
      --enable-chunked-prefill
      --trust-remote-code
      --host 0.0.0.0
      --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1']
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - t-ai-network

networks:
  t-ai-network:
    name: t-ai-network
   
